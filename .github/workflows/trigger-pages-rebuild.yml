name: Trigger Pages rebuild

on:
  push:
    paths:
      - roles/home/files/bin/clonefig.sh

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger ttj.hu rebuild
        run: |
          curl -i -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.PAGES_REPO_TOKEN }}" \
            https://api.github.com/repos/tomjtoth/tomjtoth.github.io/dispatches \
            -d '{"event_type":"rebuild"}'
