---
- name: Configure Wireguard
  include_role:
    name: wireguard

- name: Install packages
  package:
    name:
      - open-iscsi
      - procps
    state: present

- name: Enable & start open-iscsi
  service:
    name: iscsid
    state: started
    enabled: true

- name: Alpine agents
  include_tasks: alpine-agent.yml
  when: ansible_facts.distribution == "Alpine"
