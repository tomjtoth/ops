---
- name: Install packages
  package:
    name: >-
      {{ 
        ['open-iscsi', 'procps'] + 
        (
          ['open-iscsi-openrc', 'gcompat', 'yq-python'] 
          if ansible_facts.distribution == 'Alpine' else 
          ['yq']
        )
      }}
    state: present

- name: Enable & start open-iscsi
  service:
    name: iscsid
    state: started
    enabled: true

- name: Alpine agents
  include_tasks: alpine-agent.yml
  when: ansible_facts.distribution == "Alpine"
