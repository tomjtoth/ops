---
- name: restart wireguard
  service:
    name: wg-quick@wg0
    enabled: true
    state: restarted

- name: reload apparmor wg-quick
  ansible.builtin.systemd:
    name: apparmor
    state: reloaded
    daemon_reload: true

- name: restart keepalived
  service:
    name: keepalived
    enabled: true
    state: restarted
    daemon_reload: true
