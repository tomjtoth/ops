---
- name: Install utils
  package:
    name: "{{ utils }}"
    state: present
    update_cache: true

- name: Set locale
  copy:
    dest: /etc/locale.conf
    content: |
      LANG=en_US.UTF-8
      LANGUAGE=en_US.UTF-8
      LC_MESSAGES=en_US.UTF-8

      LC_ADDRESS={{ default_locale }}
      LC_COLLATE={{ default_locale }}
      LC_CTYPE={{ default_locale }}
      LC_IDENTIFICATION={{ default_locale }}
      LC_MEASUREMENT={{ default_locale }}
      LC_MONETARY={{ default_locale }}
      LC_NAME={{ default_locale }}
      LC_NUMERIC={{ default_locale }}
      LC_PAPER={{ default_locale }}
      LC_TELEPHONE={{ default_locale }}
      LC_TIME={{ default_locale }}

- name: Ensure /etc/systemd/journald.conf.d/ exists
  file:
    path: /etc/systemd/journald.conf.d/
    state: directory
    mode: 0755

- name: Limit max log size
  copy:
    dest: /etc/systemd/journald.conf.d/00-journal-size.conf
    content: |
      [Journal]
      SystemMaxUse={{ '50M' if 'laptops' in group_names else '500M' }}
  notify: Restart journald
