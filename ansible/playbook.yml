- name: Configure hosts (role-based)
  hosts: all
  vars_files:
    - group_vars/all.yml
  become: true
  roles:
    - role: common
      tags: [common]

    - role: swap
      tags: [swap]

    - role: zram
      tags: [zram]

    - role: iptables
      tags: [iptables]
      when: "'servers' in group_names"

    - role: home
      tags: [home]
      become: false

    - role: boinc
      tags: [boinc]
      when: "'boinc' in group_names"
